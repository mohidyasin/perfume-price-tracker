name: Deploy perfume price tracker

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Scrape catalog and update price history
        run: npm run update-history -- --site-limit=14 --pages=6 --items=80

      - name: Export SQLite database
        run: npm run export:sqlite

      - name: Commit updated catalog data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog-latest.json data/price-history.json data/perfume-prices.sqlite
          if git diff --cached --quiet; then
            echo "No catalog data changes to commit."
          else
            git commit -m "Update perfume catalog data [skip ci]"
            git push
          fi

      - name: Build GitHub Pages artifact
        run: npm run build:pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
